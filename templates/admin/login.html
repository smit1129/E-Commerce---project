<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – ShopZone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .logo-text { color: #1a1a2e; font-size: 24px; font-weight: 800; }
    .logo-dot  { color: #ff9900; font-size: 24px; font-weight: 800; }
    .admin-tag { background: #ff9900; color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-left: 6px; }
    .form-control { border: 1.5px solid #e8e8e8; border-radius: 8px; padding: 10px 14px; font-size: 14px; }
    .form-control:focus { border-color: #ff9900; box-shadow: 0 0 0 3px rgba(255,153,0,.15); }
    .btn-login { background: #ff9900; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 700; width: 100%; cursor: pointer; transition: background .15s; }
    .btn-login:hover { background: #e08800; }
    label { font-size: 12px; font-weight: 600; color: #444; margin-bottom: 5px; display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div style="text-align:center;margin-bottom:28px;">
      <div><span class="logo-text">Shop</span><span class="logo-dot">Zone</span><span class="admin-tag">ADMIN</span></div>
      <p style="font-size:13px;color:#888;margin-top:8px;">Sign in to Admin Panel</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" style="font-size:13px;border-radius:8px;">
        {{ msg }}
        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label><i class="fas fa-user me-1"></i>Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus/>
      </div>
      <div class="mb-4">
        <label><i class="fas fa-lock me-1"></i>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt me-2"></i>Login to Admin Panel
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;">
      <a href="{{ url_for('index') }}" style="font-size:12px;color:#888;text-decoration:none;">
        <i class="fas fa-arrow-left me-1"></i>Back to Website
      </a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
