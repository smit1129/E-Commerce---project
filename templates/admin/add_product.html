{% extends 'admin/base.html' %}
{% block title %}Add Product{% endblock %}
{% block page_title %}<i class="fas fa-plus-circle me-2" style="color:#ff9900;"></i>Add Product{% endblock %}

{% block content %}
<div class="admin-form-card">
  <form method="post">
    <div class="row g-3">
      <div class="col-12">
        <label class="admin-label">Product Name *</label>
        <input type="text" name="name" class="admin-input" placeholder="e.g. Apple iPhone 15 Pro" required/>
      </div>
      <div class="col-12">
        <label class="admin-label">Description *</label>
        <textarea name="description" class="admin-input" rows="4" placeholder="Product description..." required style="resize:vertical;"></textarea>
      </div>
      <div class="col-sm-6">
        <label class="admin-label">Price (₹) *</label>
        <input type="number" name="price" class="admin-input" step="0.01" placeholder="999.99" required/>
      </div>
      <div class="col-sm-6">
        <label class="admin-label">Original Price (₹) — for discount</label>
        <input type="number" name="original_price" class="admin-input" step="0.01" placeholder="1299.99"/>
      </div>
      <div class="col-sm-6">
        <label class="admin-label">Category *</label>
        <select name="category" class="admin-input" required>
          <option value="">Select Category</option>
          {% for cat in ['Electronics','Audio','Footwear','Fashion','Wearables','Peripherals'] %}
          <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-sm-6">
        <label class="admin-label">Badge</label>
        <select name="badge" class="admin-input">
          <option value="">No Badge</option>
          {% for b in ['Best Seller','New','Hot','Sale','Trending','Choice','Luxury'] %}
          <option value="{{ b }}">{{ b }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="admin-label">Image URL *</label>
        <input type="text" name="image_url" class="admin-input" placeholder="https://images.unsplash.com/..." required/>
        <div style="font-size:11px;color:#888;margin-top:4px;">
          Tip: Use <a href="https://unsplash.com" target="_blank" style="color:#1a73e8;">unsplash.com</a> for free images
        </div>
      </div>
      <div class="col-sm-6">
        <label class="admin-label">Stock *</label>
        <input type="number" name="stock" class="admin-input" value="100" min="0" required/>
      </div>
      <div class="col-sm-6">
        <label class="admin-label">Rating (1-5)</label>
        <input type="number" name="rating" class="admin-input" step="0.1" min="1" max="5" value="4.5"/>
      </div>
      <div class="col-12" style="margin-top:8px;display:flex;gap:10px;">
        <button type="submit" class="btn-admin-primary" style="padding:10px 24px;">
          <i class="fas fa-plus"></i> Add Product
        </button>
        <a href="{{ url_for('admin_products') }}" class="btn-admin-edit" style="padding:10px 16px;">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
